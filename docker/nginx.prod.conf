# =============================================================================
# NGINX PRODUCTION CONFIG — SSL Termination + Reverse Proxy
# =============================================================================
# This config is mounted into the Nginx container in production.
# It handles HTTPS, HTTP→HTTPS redirect, and proxying to the backend.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS Redirect
# ---------------------------------------------------------------------------
# All plain HTTP requests are permanently redirected to HTTPS.
server {
    listen 8080;
    server_name _;

    # Let's Encrypt ACME challenge (for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS Server — Main Production Config
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    # -----------------------------------------------------------------------
    # SSL CERTIFICATES
    # -----------------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern SSL settings (TLS 1.2+ only, strong ciphers)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling — faster certificate verification
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/fullchain.pem;

    # DNS resolver for OCSP stapling (Google Public DNS)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -----------------------------------------------------------------------
    # SECURITY HEADERS
    # -----------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Disable server version in headers
    server_tokens off;

    # -----------------------------------------------------------------------
    # GZIP COMPRESSION
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -----------------------------------------------------------------------
    # STATIC FILES — React SPA
    # -----------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Vite hashed assets — cache aggressively (1 year, immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static files (images, fonts)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # SPA fallback — client-side routing support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------------------
    # API REVERSE PROXY
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Production timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings for large responses (PDF downloads, etc.)
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # -----------------------------------------------------------------------
    # WEBSOCKET — Socket.io
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # DENY HIDDEN FILES
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
