# =============================================================================
# NGINX PRODUCTION CONFIG — SSL Termination + Reverse Proxy
# =============================================================================
# This file is a template. ${DOMAIN} is substituted at container startup by
# docker/nginx-entrypoint.sh via envsubst. All other nginx variables
# ($host, $uri, $remote_addr, etc.) are left untouched.
#
# Cert paths are managed by Certbot and stored in the certbot_letsencrypt
# volume, mounted read-only into the nginx container at /etc/letsencrypt.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect  (listens on 8080; host maps 80→8080)
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name ${DOMAIN} www.${DOMAIN};

    # Let's Encrypt ACME challenge — served by nginx so Certbot can renew
    # without any downtime (webroot mode).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — Main production server  (listens on 443)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name ${DOMAIN} www.${DOMAIN};

    # -------------------------------------------------------------------------
    # SSL CERTIFICATES  (written by Certbot into the shared named volume)
    # -------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session resumption for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling — faster cert verification for clients
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # SECURITY HEADERS
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"    always;
    server_tokens off;

    # -------------------------------------------------------------------------
    # GZIP COMPRESSION
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # -------------------------------------------------------------------------
    # STATIC FILES — React SPA
    # -------------------------------------------------------------------------
    root  /usr/share/nginx/html;
    index index.html;

    # Vite hashed assets — cache aggressively (1 year, immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Other static files (images, fonts)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # SPA fallback — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # API REVERSE PROXY
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # -------------------------------------------------------------------------
    # WEBSOCKET — Socket.io
    # -------------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # DENY HIDDEN FILES
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
