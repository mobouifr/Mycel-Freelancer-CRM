# =============================================================================
# PROMETHEUS ALERTING RULES — Freelancer CRM
# =============================================================================
# Loaded by Prometheus via rule_files in prometheus.yml
# =============================================================================

groups:
  - name: freelancer_crm_alerts
    rules:
      # -----------------------------------------------------------------------
      # Service Down — any monitored target is unreachable
      # -----------------------------------------------------------------------
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "The target {{ $labels.instance }} in job {{ $labels.job }} has been unreachable for more than 1 minute."

      # -----------------------------------------------------------------------
      # High HTTP Error Rate — >5% of requests returning 5xx
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: >
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of HTTP requests are returning 5xx errors over the last 5 minutes (current value: {{ $value | humanizePercentage }})."

      # -----------------------------------------------------------------------
      # High Response Latency — p95 > 1s
      # -----------------------------------------------------------------------
      - alert: HighResponseLatency
        expr: >
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP response latency (p95 > 1s)"
          description: "The 95th percentile response time has exceeded 1 second for the last 5 minutes (current p95: {{ $value | humanizeDuration }})."

      # -----------------------------------------------------------------------
      # PostgreSQL Connection Saturation — >80% of max_connections used
      # -----------------------------------------------------------------------
      - alert: PostgresConnectionSaturation
        expr: >
          sum(pg_stat_activity_count)
          /
          pg_settings_max_connections
          > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool nearing saturation"
          description: "PostgreSQL is using more than 80% of its max_connections ({{ $value | humanizePercentage }} used)."

      # -----------------------------------------------------------------------
      # High Node.js Memory — Backend using > 512MB RSS
      # -----------------------------------------------------------------------
      - alert: HighNodeMemory
        expr: process_resident_memory_bytes{job="nestjs-backend"} > 536870912
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend memory usage is high"
          description: "The NestJS backend is using more than 512MB of resident memory (current: {{ $value | humanize1024 }}B)."
