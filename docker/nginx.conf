# ============================================================================
# NGINX CONFIGURATION — Frontend SPA Serving + API Reverse Proxy (DEVELOPMENT)
# ============================================================================
# This config is used inside the frontend Docker container (dev and prod).
# It handles:
#   1. Serving the React SPA with proper client-side routing
#   2. Proxying /api requests to the backend service
#   3. Security headers
#   4. Gzip compression for performance
#   5. Static asset caching
#
# NOTE: Listens on port 8080 (non-privileged) so the container can run
#       as the non-root 'nginx' user. External port mapping is done in
#       docker-compose.yml / docker-compose.prod.yml.
# ============================================================================

server {
    listen 8080;
    server_name _;

    # Root directory where Vite build output lives
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # GZIP COMPRESSION — Reduce payload size for faster load times
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # -----------------------------------------------------------------------
    # SECURITY HEADERS — Defense-in-depth for the frontend
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Disable server version exposure
    server_tokens off;

    # -----------------------------------------------------------------------
    # API REVERSE PROXY — Forward /api/* requests to the backend service
    # -----------------------------------------------------------------------
    # In Docker Compose, "backend" resolves to the backend container.
    # This avoids CORS issues since frontend and API share the same origin.
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;

        # Forward real client info to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (PDF generation, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------------------
    # WEBSOCKET ENDPOINT — Socket.io needs its own location block
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # STATIC ASSET CACHING — Vite hashed filenames allow aggressive caching
    # -----------------------------------------------------------------------
    # Vite adds content hashes to filenames (e.g., index-abc123.js),
    # so we can cache them for 1 year. If the content changes, the hash changes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other static files (images, fonts) for 30 days
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # SPA FALLBACK — All non-file routes fall back to index.html
    # -----------------------------------------------------------------------
    # This is essential for client-side routing (React Router).
    # Without it, refreshing on /dashboard would return a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------------------
    # DENY ACCESS — Block access to hidden files (.env, .git, etc.)
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
