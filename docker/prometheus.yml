# =============================================================================
# PROMETHEUS CONFIGURATION — Freelancer CRM
# =============================================================================
# Mounted into Prometheus container at /etc/prometheus/prometheus.yml
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # NestJS backend application metrics
  - job_name: nestjs-backend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - backend:3001

  # PostgreSQL metrics via postgres-exporter
  - job_name: postgres
    scrape_interval: 15s
    static_configs:
      - targets:
          - postgres-exporter:9187
