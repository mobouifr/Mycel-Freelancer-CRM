name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests
  backend:
    name: 🔧 Backend (NestJS)
    runs-on: ubuntu-latest
    
    # Skip if no backend code exists yet
    if: hashFiles('apps/backend/package.json') != ''
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # FIX: Only cache if package-lock.json exists
          cache: ${{ hashFiles('apps/backend/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: 'apps/backend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: apps/backend
        run: npm ci || npm install

      - name: 🔍 Lint
        working-directory: apps/backend
        run: npm run lint || echo "⚠️ No lint script"

      - name: 🏗️ Build
        working-directory: apps/backend
        run: npm run build

      - name: ✅ Backend complete
        run: echo "✅ Backend checks passed"

  # Frontend Tests
  frontend:
    name: ⚛️ Frontend (React)
    runs-on: ubuntu-latest
    
    # Skip if no frontend code exists yet
    if: hashFiles('apps/frontend/package.json') != ''
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # FIX: Only cache if package-lock.json exists
          cache: ${{ hashFiles('apps/frontend/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: 'apps/frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: apps/frontend
        run: npm ci || npm install

      - name: 🔍 Lint
        working-directory: apps/frontend
        run: npm run lint || echo "⚠️ No lint script"

      - name: 🏗️ Build
        working-directory: apps/frontend
        run: npm run build

      - name: ✅ Frontend complete
        run: echo "✅ Frontend checks passed"

  # Docker Build
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Always run, even if backend/frontend skipped
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Verify docker-compose
        run: |
          if [ -f "docker-compose.yml" ]; then
            echo "✅ docker-compose.yml exists"
          else
            echo "❌ docker-compose.yml missing"
            exit 1
          fi

      - name: ✅ Docker checks complete
        run: echo "✅ Docker configuration verified"
