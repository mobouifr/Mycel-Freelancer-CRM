name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ===========================================================================
  # Job 1 — Backend: Lint, Test (with Postgres), Build
  # ===========================================================================
  backend:
    name: 🔧 Backend (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for backend package.json
        id: check-backend
        working-directory: apps/backend
        run: |
          if [ ! -f package.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 💾 Cache backend node_modules
        uses: actions/cache@v3
        with:
          path: |
            apps/backend/node_modules
            ~/.npm
          key: ${{ runner.os }}-backend-${{ hashFiles('apps/backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: 📦 Install backend dependencies
        if: steps.check-backend.outputs.skip != 'true'
        working-directory: apps/backend
        run: npm ci || npm install

      - name: 🧪 Prisma validate
        if: steps.check-backend.outputs.skip != 'true'
        working-directory: apps/backend
        run: npx prisma validate --schema=../../prisma/schema.prisma

      - name: 🔍 Lint backend
        if: steps.check-backend.outputs.skip != 'true'
        working-directory: apps/backend
        run: |
          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ] || [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ]; then
            npm run lint
          else
            echo "ℹ️ No ESLint config found in apps/backend. Skipping lint."
          fi

      - name: ✅ Backend tests (Postgres)
        if: steps.check-backend.outputs.skip != 'true'
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm run test -- --runInBand --passWithNoTests

      - name: 🏗️ Build backend
        if: steps.check-backend.outputs.skip != 'true'
        working-directory: apps/backend
        run: npm run build

  # ===========================================================================
  # Job 2 — Frontend: Lint, Build
  # ===========================================================================
  frontend:
    name: ⚛️ Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for frontend package.json
        id: check-frontend
        working-directory: apps/frontend
        run: |
          if [ ! -f package.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 💾 Cache frontend node_modules
        uses: actions/cache@v3
        with:
          path: |
            apps/frontend/node_modules
            ~/.npm
          key: ${{ runner.os }}-frontend-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: 📦 Install frontend dependencies
        if: steps.check-frontend.outputs.skip != 'true'
        working-directory: apps/frontend
        run: npm ci || npm install

      - name: 🔍 Lint frontend
        if: steps.check-frontend.outputs.skip != 'true'
        working-directory: apps/frontend
        run: |
          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ] || [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.json ]; then
            npm run lint
          else
            echo "ℹ️ No ESLint config found in apps/frontend. Skipping lint."
          fi

      - name: 🏗️ Build frontend
        if: steps.check-frontend.outputs.skip != 'true'
        working-directory: apps/frontend
        env:
          VITE_API_URL: /api
        run: npm run build

  # ===========================================================================
  # Job 3 — Docker build verification
  # ===========================================================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧱 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: production
          push: false
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 4 — Code Quality Checks
  # ===========================================================================
  code-quality:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Ensure .env is not committed
        run: |
          if git ls-files --error-unmatch ".env" >/dev/null 2>&1; then
            echo "❌ .env file is committed. Remove it from the repo and use environment secrets instead."
            exit 1
          else
            echo "✅ .env file is not committed."
          fi

      - name: 🕵️ Scan for console.log in src/
        run: |
          FILES=$(git ls-files "apps/**/src/**/*.ts" "apps/**/src/**/*.tsx" "apps/**/src/**/*.js" "apps/**/src/**/*.jsx" || true)
          if [ -z "$FILES" ]; then
            echo "ℹ️ No src files to scan."
            exit 0
          fi

          if echo "$FILES" | xargs -r grep -n "console.log" ; then
            echo "❌ console.log found in source files. Please remove debug logging."
            exit 1
          else
            echo "✅ No console.log statements found."
          fi

      - name: 🧬 Scan for hardcoded secrets
        run: |
          PATTERN='(API_KEY|SECRET_KEY|SECRET=|TOKEN=|sk_live_|pk_live_|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'
          FILES=$(git ls-files | grep -Ev '(^package-lock\.json$|^yarn\.lock$|^\.env\.example$|^docs/|^\.github/workflows/ci\.yml$|node_modules/|dist/|build/|\.git/)' || true)
          if [ -z "$FILES" ]; then
            echo "ℹ️ No files to scan."
            exit 0
          fi

          if echo "$FILES" | xargs -r grep -En "$PATTERN" ; then
            echo "❌ Potential hardcoded secrets detected above. Please review and move secrets to env/secret management."
            exit 1
          else
            echo "✅ No obvious hardcoded secrets found."
          fi
