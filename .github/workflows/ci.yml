name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================================
  # Job 1 — Backend: Lint, Test (with Postgres), Build
  # ===========================================================================
  backend:
    name: 🔧 Backend (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 💾 Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            ~/.npm
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: 🧪 Prisma generate & migrate
        working-directory: backend
        run: |
          npx prisma generate --schema=../prisma/schema.prisma
          npx prisma migrate deploy --schema=../prisma/schema.prisma

      - name: 🔍 Lint backend
        working-directory: backend
        run: npm run lint

      - name: ✅ Backend tests
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm run test -- --runInBand --passWithNoTests

      - name: 🏗️ Build backend
        working-directory: backend
        run: npm run build

  # ===========================================================================
  # Job 2 — Frontend: Lint, Build
  # ===========================================================================
  frontend:
    name: ⚛️ Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 💾 Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

  # ===========================================================================
  # Job 3 — Docker build (only on push to main)
  # ===========================================================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧱 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/freelancer-crm-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/freelancer-crm-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/freelancer-crm-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/freelancer-crm-frontend:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 4 — Code Quality Checks
  # ===========================================================================
  code-quality:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Ensure .env is not committed
        run: |
          if git ls-files --error-unmatch ".env" >/dev/null 2>&1; then
            echo "❌ .env file is committed. Remove it from the repo and use environment secrets instead."
            exit 1
          else
            echo "✅ .env file is not committed."
          fi

      - name: 🕵️ Scan for console.log in src/
        run: |
          FILES=$(git ls-files "backend/src/**/*.ts" "frontend/src/**/*.ts" "frontend/src/**/*.tsx" || true)
          if [ -z "$FILES" ]; then
            echo "ℹ️ No src files to scan."
            exit 0
          fi

          if echo "$FILES" | xargs -r grep -n "console.log" ; then
            echo "❌ console.log found in source files. Please remove debug logging."
            exit 1
          else
            echo "✅ No console.log statements found."
          fi

      - name: 🧬 Scan for hardcoded secrets
        run: |
          PATTERN='(API_KEY|SECRET_KEY|SECRET=|TOKEN=|sk_live_|pk_live_|-----BEGIN (RSA |EC )?PRIVATE KEY-----)'
          FILES=$(git ls-files | grep -Ev '(^package-lock\.json$|^yarn\.lock$|^\.env\.example$|^docs/|^\.github/workflows/ci\.yml$|node_modules/|dist/|build/|\.git/)' || true)
          if [ -z "$FILES" ]; then
            echo "ℹ️ No files to scan."
            exit 0
          fi

          if echo "$FILES" | xargs -r grep -En "$PATTERN" ; then
            echo "❌ Potential hardcoded secrets detected above. Please review and move secrets to env/secret management."
            exit 1
          else
            echo "✅ No obvious hardcoded secrets found."
          fi

  # ===========================================================================
  # Job 5 — Deploy (only after CI passes, only on push to main)
  # ===========================================================================
  cd:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to production
        run: echo "Deploy step — configure with your deployment target (SSH, AWS ECS, K8s, etc.)"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
