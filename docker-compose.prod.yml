# =============================================================================
# FREELANCER CRM — Docker Compose (PRODUCTION)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
#
# Prerequisites:
#   - SSL certificates in ./docker/ssl/ (fullchain.pem + privkey.pem)
#   - Production .env file with real secrets
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Production Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: freelancer-crm-postgres
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Disable trust authentication in production
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"

    # NO host port exposure in production — only accessible within Docker network
    # If you need external DB access, use an SSH tunnel instead
    expose:
      - "5432"

    volumes:
      - freelancer_crm_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-freelancer_crm}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Resource limits — prevent runaway memory usage
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Migrate — Run Prisma migrations once, then exit (Init Container Pattern)
  # ---------------------------------------------------------------------------
  # This service runs migrations BEFORE the backend starts. It exits with
  # code 0 on success. If it fails, the backend will not start.
  # This prevents race conditions when scaling backend to multiple replicas.
  migrate:
    container_name: freelancer-crm-migrate
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: "no"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freelancer_crm}?schema=public
      NODE_ENV: production

    # Run migrations and exit
    command: >
      sh -c "npx prisma migrate deploy"

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Backend — NestJS API Server (Production Build)
  # ---------------------------------------------------------------------------
  backend:
    container_name: freelancer-crm-backend
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: always

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freelancer_crm}?schema=public
      NODE_ENV: production

    # NO host port exposure — Nginx reverse proxies to backend internally
    expose:
      - "3001"

    # NO source code volumes — the compiled app is baked into the image
    # This ensures immutable deployments

    # Migrations are handled by the 'migrate' init service above
    # Backend just starts the server directly
    command: [ "node", "dist/main.js" ]

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

    # Log rotation to prevent disk from filling up
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Frontend + Nginx Reverse Proxy — Serves SPA + SSL Termination
  # ---------------------------------------------------------------------------
  # In production, Nginx serves the built React app AND proxies /api to backend.
  # It also handles SSL termination (HTTPS).
  nginx:
    container_name: freelancer-crm-nginx
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      # Full production build: React build → Nginx serving static files
      target: production
      args:
        # Set the API URL for the Vite build (baked into the JS bundle)
        VITE_API_URL: /api
    restart: always

    ports:
      # HTTP → redirected to HTTPS by Nginx
      - "80:8080"
      # HTTPS — production traffic
      - "443:443"

    volumes:
      # Mount SSL certificates (from Let's Encrypt, Certbot, etc.)
      - ./docker/ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./docker/ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # Mount production Nginx config with SSL block
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - freelancer_crm_network
  # NO Adminer in production — use SSH tunnel + local client for DB access

  # =============================================================================
  # NETWORKS
  # =============================================================================
networks:
  freelancer_crm_network:
    name: freelancer_crm_network
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  freelancer_crm_postgres_data:
    name: freelancer_crm_postgres_data
    driver: local
