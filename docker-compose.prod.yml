# =============================================================================
# FREELANCER CRM — Docker Compose (PRODUCTION)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
#
# Prerequisites:
#   - SSL certificates in ./docker/ssl/ (fullchain.pem + privkey.pem)
#   - Production .env file with real secrets
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Production Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: freelancer-crm-postgres
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Disable trust authentication in production
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"

    # NO host port exposure in production — only accessible within Docker network
    # If you need external DB access, use an SSH tunnel instead
    expose:
      - "5432"

    volumes:
      - freelancer_crm_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-freelancer_crm}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Resource limits — prevent runaway memory usage
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Migrate — Run Prisma migrations once, then exit (Init Container Pattern)
  # ---------------------------------------------------------------------------
  # This service runs migrations BEFORE the backend starts. It exits with
  # code 0 on success. If it fails, the backend will not start.
  # This prevents race conditions when scaling backend to multiple replicas.
  migrate:
    container_name: freelancer-crm-migrate
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: "no"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freelancer_crm}?schema=public
      NODE_ENV: production

    # Run migrations and exit
    command: >
      sh -c "npx prisma migrate deploy"

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Backend — NestJS API Server (Production Build)
  # ---------------------------------------------------------------------------
  backend:
    container_name: freelancer-crm-backend
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: always

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freelancer_crm}?schema=public
      NODE_ENV: production

    # NO host port exposure — Nginx reverse proxies to backend internally
    expose:
      - "3001"

    # NO source code volumes — the compiled app is baked into the image
    # This ensures immutable deployments

    # Migrations are handled by the 'migrate' init service above
    # Backend just starts the server directly
    command: [ "node", "dist/main.js" ]

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

    # Log rotation to prevent disk from filling up
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Frontend + Nginx — Serves SPA + SSL Termination
  # ---------------------------------------------------------------------------
  # Nginx master runs as root to bind port 443. Worker processes drop to the
  # 'nginx' user via the 'user nginx;' directive in /etc/nginx/nginx.conf.
  # The production config is generated at startup from nginx.prod.conf (template)
  # via envsubst, injecting the DOMAIN env var.
  nginx:
    container_name: freelancer-crm-nginx
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: production
      args:
        VITE_API_URL: /api
    restart: always

    environment:
      # Domain name for SSL cert paths and server_name in nginx config.
      # Must match the domain used to issue the Let's Encrypt certificate.
      DOMAIN: ${DOMAIN}

    ports:
      - "80:8080"    # HTTP  → HTTPS redirect (+ ACME challenge)
      - "443:443"    # HTTPS → production traffic

    volumes:
      # Production nginx config template — envsubst fills in ${DOMAIN} at startup
      - ./docker/nginx.prod.conf:/etc/nginx/nginx.prod.conf.template:ro
      # Let's Encrypt certificates (written by Certbot service below)
      - certbot_letsencrypt:/etc/letsencrypt:ro
      # Shared webroot for ACME challenge files
      - certbot_webroot:/var/www/certbot

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.25"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - freelancer_crm_network

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt certificate issuance and automatic renewal
  # ---------------------------------------------------------------------------
  # Runs in webroot mode: nginx serves the ACME challenge on port 80 while
  # certbot writes the challenge token to the shared certbot_webroot volume.
  # After a successful renewal, certbot reloads nginx via the Docker socket.
  #
  # First-time setup: run  make ssl-init  before starting this stack.
  certbot:
    image: certbot/certbot:latest
    container_name: freelancer-crm-certbot
    restart: unless-stopped

    volumes:
      # Persistent store for certs, keys, accounts, and renewal config
      - certbot_letsencrypt:/etc/letsencrypt
      # Shared ACME challenge webroot with nginx
      - certbot_webroot:/var/www/certbot
      # Docker socket so certbot can reload nginx after renewal
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Renew check every 12 h. Certbot only actually renews when < 30 days remain.
    # Post-hook reloads nginx gracefully (zero downtime).
    entrypoint: >
      /bin/sh -c "
        apk add --no-cache docker-cli --quiet 2>/dev/null;
        trap exit TERM;
        while :; do
          certbot renew
            --webroot -w /var/www/certbot
            --quiet
            --post-hook 'docker exec freelancer-crm-nginx nginx -s reload';
          sleep 12h & wait $${!};
        done
      "

    depends_on:
      - nginx

    networks:
      - freelancer_crm_network

  # NO Adminer in production — use SSH tunnel + local psql for DB access

  # ===========================================================================
  # NETWORKS
  # ===========================================================================
networks:
  freelancer_crm_network:
    name: freelancer_crm_network
    driver: bridge

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  freelancer_crm_postgres_data:
    name: freelancer_crm_postgres_data
    driver: local

  # Certbot: stores /etc/letsencrypt (certs, keys, renewal config, accounts)
  certbot_letsencrypt:
    name: certbot_letsencrypt
    driver: local

  # Certbot: shared ACME challenge webroot with nginx
  certbot_webroot:
    name: certbot_webroot
    driver: local
